<!DOCTYPE html>
<html>
<head>
    <title>Crop Disease Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: #2E7D32;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2E7D32;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button.secondary {
            background: #1565C0;
        }

        button.logout {
            background: #c62828;
        }

        button:disabled {
            background: gray;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f8f4;
            border-radius: 6px;
        }

        #loading {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Crop Disease Detection</h1>

    <!-- LOGIN / SIGNUP -->
    <div id="authSection">
        <h3>Login / Sign Up</h3>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <button class="secondary" onclick="signup()">Sign Up</button>

        <p id="authMessage"></p>
    </div>

    <!-- UPLOAD SECTION -->
    <div id="uploadSection" class="hidden">
        <h3>Upload Crop Image (JPG ≤ 500KB)</h3>

        <input type="file" id="imageInput" accept="image/jpeg">
        <p id="fileError" class="error"></p>

        <button id="analyzeBtn" disabled>Analyze Crop</button>

        <div id="loading" class="hidden">Analyzing...</div>

        <div id="result" class="result hidden"></div>

        <button class="logout" onclick="logout()">Logout</button>
    </div>

</div>

<script>
    const authSection = document.getElementById("authSection");
    const uploadSection = document.getElementById("uploadSection");
    const authMessage = document.getElementById("authMessage");
    const imageInput = document.getElementById("imageInput");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const fileError = document.getElementById("fileError");
    const resultDiv = document.getElementById("result");
    const loading = document.getElementById("loading");

    let selectedFile = null;

    if (localStorage.getItem("token")) {
        showUpload();
    }

    function showUpload() {
        authSection.classList.add("hidden");
        uploadSection.classList.remove("hidden");
    }

    function logout() {
        localStorage.removeItem("token");
        location.reload();
    }

    function signup() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            authMessage.className = "error";
            authMessage.textContent = "Please fill all fields.";
            return;
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        if (users.find(u => u.username === username)) {
            authMessage.className = "error";
            authMessage.textContent = "User already exists.";
            return;
        }

        users.push({ username, password });
        localStorage.setItem("users", JSON.stringify(users));

        authMessage.className = "success";
        authMessage.textContent = "Signup successful! Now login.";
    }

    function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        let users = JSON.parse(localStorage.getItem("users")) || [];
        const user = users.find(u => u.username === username);

        if (!user) {
            authMessage.className = "error";
            authMessage.textContent = "Account does not exist. Please sign up first.";
            return;
        }

        if (user.password !== password) {
            authMessage.className = "error";
            authMessage.textContent = "Incorrect password.";
            return;
        }

        localStorage.setItem("token", "dummy-token");
        showUpload();
    }

    imageInput.addEventListener("change", function() {
        const file = this.files[0];
        if (!file) return;

        if (file.type !== "image/jpeg") {
            fileError.textContent = "Only JPG files allowed.";
            analyzeBtn.disabled = true;
            return;
        }

        if (file.size > 512000) {
            fileError.textContent = "File must be 500KB or less.";
            analyzeBtn.disabled = true;
            return;
        }

        fileError.textContent = "";
        selectedFile = file;
        analyzeBtn.disabled = false;
    });

    analyzeBtn.addEventListener("click", async function() {
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append("file", selectedFile); // Must match backend parameter

        loading.classList.remove("hidden");
        resultDiv.classList.add("hidden");

        try {
            // Connect to FastAPI backend
            const response = await fetch("http://127.0.0.1:8000/predict", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Backend error");

            const data = await response.json();

            resultDiv.innerHTML = `
                <h3>Disease: ${data.disease}</h3>
                <p>Confidence: ${(data.confidence*100).toFixed(2)}%</p>
            `;

            resultDiv.classList.remove("hidden");

        } catch (err) {
            console.error(err);
            resultDiv.innerHTML = "<p class='error'>Error connecting to backend!</p>";
            resultDiv.classList.remove("hidden");
        } finally {
            loading.classList.add("hidden");
        }
    });
</script>

</body>
</html>
