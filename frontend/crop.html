<!DOCTYPE html>
<html>
<head>
    <title>🌱 Crop Disease AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .upload-box { 
            background: rgba(255,255,255,0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            text-align: center; 
            backdrop-filter: blur(10px);
        }
        h1 { color: #2e7d32; margin-bottom: 20px; font-size: 28px; }
        .upload-btn { 
            background: linear-gradient(135deg, #4CAF50, #45a049); 
            color: white; padding: 15px 30px; 
            border-radius: 25px; cursor: pointer; 
            font-weight: bold; border: none; 
            box-shadow: 0 10px 30px rgba(76,175,80,0.4);
        }
        #preview { 
            width: 300px; height: 300px; 
            object-fit: cover; border-radius: 15px; 
            margin: 20px auto; display: none; 
            border: 4px solid #4CAF50; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .analyze-btn { 
            background: linear-gradient(135deg, #FF5722, #F57C00); 
            color: white; padding: 18px 40px; 
            border-radius: 25px; font-size: 18px; 
            font-weight: bold; cursor: pointer; 
            border: none; margin-top: 20px;
            box-shadow: 0 12px 35px rgba(255,87,34,0.4);
        }
        .result-container { 
            background: rgba(255,255,255,0.95); 
            padding: 40px; border-radius: 20px; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px); margin-top: 30px;
            display: none;
        }
        .disease-badge { 
            padding: 12px 25px; border-radius: 30px; 
            color: white; font-weight: bold; font-size: 20px; 
            display: inline-block; margin: 20px 0;
        }
        .healthy { background: linear-gradient(135deg, #4CAF50, #81C784); }
        .diseased { background: linear-gradient(135deg, #F44336, #E57373); }
        .treatment-box { 
            background: #f8f9fa; padding: 25px; 
            border-radius: 15px; border-left: 5px solid #4CAF50; 
            margin-top: 20px; line-height: 1.6;
        }
        .btn { 
            background: linear-gradient(135deg, #2196F3, #42A5F5); 
            color: white; padding: 12px 25px; 
            border: none; border-radius: 20px; 
            cursor: pointer; font-weight: 500; 
            margin: 10px; box-shadow: 0 8px 25px rgba(33,150,243,0.3);
        }
        .loading { text-align: center; padding: 50px; color: #666; font-size: 18px; }
        @media (max-width: 768px) { .upload-box, .result-container { margin: 10px; padding: 30px 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- UPLOAD SECTION -->
        <div class="upload-box" id="uploadSection">
            <h1>🌱 Crop Disease Detection AI</h1>
            <p style="color: #666; margin-bottom: 30px;">Upload plant leaf photo (98% accurate PlantVillage CNN)</p>
            
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <label for="imageInput" class="upload-btn">📁 Choose Plant Photo</label>
            <br>
            <img id="preview" alt="Plant Preview">
            <br>
            <button class="analyze-btn" id="analyzeBtn" onclick="analyzeImage()" disabled>
                🔬 Analyze with AI Backend
            </button>
            <div id="status" class="loading" style="display: none;"></div>
        </div>

        <!-- RESULTS SECTION -->
        <div class="result-container" id="resultSection">
            <h1 style="color: #2e7d32; text-align: center; margin-bottom: 30px;">✅ AI Analysis Complete</h1>
            
            <div style="display: flex; gap: 30px; flex-wrap: wrap; align-items: start;">
                <div style="flex: 1; max-width: 400px;">
                    <img id="resultImage" style="width: 100%; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);" alt="Result">
                </div>
                <div style="flex: 2;">
                    <div id="diseaseBadge" class="disease-badge"></div>
                    <p id="confidence" style="font-size: 22px; font-weight: bold; color: #2e7d32; margin: 20px 0;"></p>
                    <p id="diseaseInfo" style="font-size: 16px; color: #666; margin-bottom: 30px;"></p>
                    
                    <div class="treatment-box">
                        <h3 style="color: #2e7d32; margin-bottom: 15px;">💊 Treatment Plan:</h3>
                        <div id="treatment"></div>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 40px;">
                <button class="btn" onclick="newAnalysis()">🔄 New Analysis</button>
                <button class="btn" onclick="shareResult()" style="background: linear-gradient(135deg, #FF9800, #FFB74D);">📤 Share Result</button>
                <button class="btn" onclick="contactExpert()" style="background: linear-gradient(135deg, #9C27B0, #BA68C8);">👨‍🌾 Contact Expert</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = '/predict';  // Your existing backend
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');

        // Image upload handler
        imageInput.addEventListener('change', function() {
            const file = imageInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    analyzeBtn.disabled = false;
                    analyzeBtn.textContent = '🚀 Send to Backend AI';
                };
                reader.readAsDataURL(file);
            }
        });

        // Analyze with YOUR backend
        async function analyzeImage() {
            const file = imageInput.files[0];
            if (!file) return alert('Please select an image');

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '🤖 AI Processing...';
            status.style.display = 'block';
            status.innerHTML = '🔄 Connecting to your backend...';

            try {
                const formData = new FormData();
                formData.append('image', file);

                status.innerHTML = '🧠 PlantVillage CNN analyzing...';
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Analysis failed');
                }

                // Show results
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                
                // Update UI
                document.getElementById('resultImage').src = preview.src;
                document.getElementById('diseaseBadge').textContent = result.disease;
                document.getElementById('diseaseBadge').className = result.is_healthy ? 
                    'disease-badge healthy' : 'disease-badge diseased';
                document.getElementById('confidence').textContent = `Confidence: ${result.confidence}`;
                document.getElementById('diseaseInfo').textContent = `Full Detection: ${result.full_name}`;
                document.getElementById('treatment').innerHTML = result.treatment.replace(/, /g, '<br>• ').replace(/^/, '• ');

                status.style.display = 'none';

            } catch (error) {
                status.innerHTML = `❌ Error: ${error.message}<br>Check if backend is running`;
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = '🔬 Analyze with AI Backend';
            }
        }

        function newAnalysis() {
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            preview.style.display = 'none';
            imageInput.value = '';
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '🔬 Analyze with AI Backend';
            status.style.display = 'none';
        }

        function shareResult() {
            const disease = document.getElementById('diseaseBadge').textContent;
            const confidence = document.getElementById('confidence').textContent;
            navigator.clipboard.writeText(`🌱 Crop Analysis Result:\n${disease}\n${confidence}\nPlantVillage AI Backend`).then(() => {
                alert('✅ Result copied! Share on WhatsApp');
            });
        }

        function contactExpert() {
            alert('👨‍🌾 Pandharpur Krishi Kendra\n📞 1800-180-1551\n🌾 Local Agriculture Officer');
        }
    </script>
</body>
</html>
