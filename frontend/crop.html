<!DOCTYPE html>
<html>
<head>
<title>🌱 AI Crop Health Diagnosis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#f8f9fa,#e9ecef);
min-height:100vh;
padding:20px;
}

/* HEADER */
.upload-page header{
background:linear-gradient(135deg,#2e7d32,#4caf50);
color:white;
padding:25px;
text-align:center;
font-size:28px;
border-radius:20px 20px 0 0;
margin:-20px -20px 30px -20px;
}

/* UPLOAD BOX */
.upload-section{
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
}

.upload-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
text-align:center;
max-width:480px;
}

.upload-btn{
background:#4caf50;
color:white;
padding:14px 28px;
border-radius:10px;
cursor:pointer;
display:inline-block;
margin-bottom:20px;
}

#preview{
width:250px;
height:250px;
object-fit:cover;
border-radius:15px;
margin:20px auto;
display:none;
}

.analyze-btn{
background:#e53935;
color:white;
border:none;
padding:14px 35px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* RESULT PAGE */
.result-page{display:none;}

.result-container{
max-width:1000px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.result-title{
text-align:center;
font-size:30px;
color:#2e7d32;
margin-bottom:30px;
}

.top-section{
display:flex;
gap:30px;
}

.image-box{
flex:1;
}

#plantImage{
width:100%;
border-radius:15px;
}

.overlay{
background:#2e7d32;
color:white;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.info-side{flex:1;}

.card{
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.causes{
background:#ffebee;
color:#c62828;
}

.prevention{
background:#e8f5e9;
color:#2e7d32;
}

.bottom-cards{
display:flex;
gap:15px;
margin:30px 0;
}

.alert{
flex:1;
padding:20px;
border-radius:12px;
color:white;
text-align:center;
}

.weather{background:#2196f3;}
.soil{background:#795548;}
.pest{background:#ff9800;}

.buttons{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:12px 25px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.guide{background:#2196f3;}
.expert{background:#ff9800;}
.tips{background:#4caf50;}
.share{background:#9c27b0;}

#language{
position:fixed;
top:20px;
right:20px;
padding:8px 12px;
border-radius:8px;
border:1px solid #ccc;
background:white;
font-size:14px;
z-index:1000;
}
</style>
</head>

<body>

<!-- UPLOAD PAGE -->
<div class="upload-page" id="uploadPage">
<header id="headerTitle">🌱 AI Crop Health Diagnosis</header>
<section class="upload-section">
<div class="upload-box">
<h2 id="uploadTitle">Upload Plant Photo for Analysis</h2>
<label for="imageInput" class="upload-btn" id="chooseImg">📁 Choose Image</label>
<input type="file" id="imageInput" accept="image/*" style="display:none;">
<img id="preview">
<br>
<button class="analyze-btn" id="analyzeBtn" onclick="analyzeCrop()" disabled>
🔬 Analyze Crop
</button>
</div>
</section>
</div>

<!-- RESULT PAGE -->
<div class="result-page" id="resultPage">
<div class="result-container">
<h2 class="result-title" id="resultTitle">✅ Analysis Complete</h2>
<div class="top-section">
<div class="image-box">
<img id="plantImage">
<div class="overlay">
<h3 id="diseaseName">Processing...</h3>
<p id="confidence"></p>
</div>
</div>
<div class="info-side">
<div class="card causes">
<h3>🦠 Disease Causes</h3>
<ul id="causesList"></ul>
</div>
<div class="card prevention">
<h3>💊 Treatment Plan</h3>
<ul id="preventionList"></ul>
</div>
</div>
</div>

<div class="bottom-cards">
<div class="alert weather" id="weather">🌤 Weather<br>Humidity 78%</div>
<div class="alert soil" id="soil">🌾 Soil<br>Nitrogen Low</div>
<div class="alert pest" id="pest">🐛 Pest<br>Aphids Present</div>
</div>

<div class="buttons">
<button class="btn guide" onclick="showGuide()" id="guideBtn">📖 Guide</button>
<button class="btn expert" onclick="contactExpert()" id="expertBtn">👨‍🌾 Expert</button>
<button class="btn tips" onclick="newScan()" id="scanBtn">🔄 New Scan</button>
<button class="btn share" onclick="shareResult()" id="shareBtn">📤 Share</button>

<select id="district">
<option value="919552107229">Solapur Officer</option>
<option value="919876543210">Pune Officer</option>
<option value="919765432100">Satara Officer</option>
</select>
</div>
</div>
</div>

<select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
</select>

<script>
const uploadPage = document.getElementById('uploadPage');
const resultPage = document.getElementById('resultPage');
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');
const analyzeBtn = document.getElementById('analyzeBtn');

const diagnoses = [
{
name:{en:"Early Blight", hi:"अर्ली ब्लाइट", mr:"अर्ली ब्लाइट"},
cause:{en:"Fungal pathogen (Alternaria solani)", hi:"फफूंद रोग (अल्टरनेरिया सोलानी)", mr:"बुरशीजन्य रोग (अल्टरनेरिया सोलानी)"},
treatment:{en:"Apply copper fungicide, prune lower leaves", hi:"कॉपर फंगीसाइड का उपयोग करें, नीचे की पत्तियां काटें", mr:"कॉपर फंगीसाइड वापरा, खालची पाने काढा"}
},
{
name:{en:"Late Blight", hi:"लेट ब्लाइट", mr:"लेट ब्लाइट"},
cause:{en:"Phytophthora infestans fungus", hi:"फाइटोफ्थोरा इंफेस्टन्स फफूंद", mr:"फायटोफ्थोरा इंफेस्टन्स बुरशी"},
treatment:{en:"Remove infected plants, apply fungicide", hi:"संक्रमित पौधे हटाएं, फंगीसाइड लगाएं", mr:"संक्रमित झाडे काढा, फंगीसाइड फवारणी करा"}
},
{
name:{en:"Bacterial Spot", hi:"बैक्टीरियल स्पॉट", mr:"बॅक्टेरियल स्पॉट"},
cause:{en:"Bacterial infection", hi:"बैक्टीरियल संक्रमण", mr:"जिवाणू संसर्ग"},
treatment:{en:"Use bactericide spray", hi:"बैक्टीरिसाइड स्प्रे का उपयोग करें", mr:"बॅक्टेरिसाइड फवारणी करा"}
}
];

const interfaceText = {
en:{
header:"🌱 AI Crop Health Diagnosis",
uploadTitle:"Upload Plant Photo for Analysis",
chooseImg:"📁 Choose Image",
analyzeBtn:"🔬 Analyze Crop",
weather:"🌤 Weather<br>Humidity 78%",
soil:"🌾 Soil<br>Nitrogen Low",
pest:"🐛 Pest<br>Aphids Present",
guide:"📖 Guide",
expert:"👨‍🌾 Expert",
scan:"🔄 New Scan",
share:"📤 Share"
},
hi:{
header:"🌱 एआई फसल स्वास्थ्य विश्लेषण",
uploadTitle:"विश्लेषण के लिए पौधे की फोटो अपलोड करें",
chooseImg:"📁 इमेज चुनें",
analyzeBtn:"🔬 फसल का विश्लेषण करें",
weather:"🌤 मौसम<br>आर्द्रता 78%",
soil:"🌾 मिट्टी<br>नाइट्रोजन कम",
pest:"🐛 कीट<br>एफिड्स मौजूद",
guide:"📖 गाइड",
expert:"👨‍🌾 विशेषज्ञ",
scan:"🔄 नया स्कैन",
share:"📤 साझा करें"
},
mr:{
header:"🌱 एआय पीक आरोग्य निदान",
uploadTitle:"विश्लेषणासाठी झाडाची फोटो अपलोड करा",
chooseImg:"📁 प्रतिमा निवडा",
analyzeBtn:"🔬 पीक विश्लेषण करा",
weather:"🌤 हवामान<br>आर्द्रता 78%",
soil:"🌾 माती<br>नायट्रोजन कमी",
pest:"🐛 कीटक<br>एफिड्स उपस्थित",
guide:"📖 मार्गदर्शक",
expert:"👨‍🌾 तज्ज्ञ",
scan:"🔄 नवीन स्कॅन",
share:"📤 शेअर करा"
}
};

imageInput.addEventListener('change', function(){
  const file = imageInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    preview.src = e.target.result;
    preview.style.display='block';
    analyzeBtn.disabled=false;
  }
  reader.readAsDataURL(file);
});

function analyzeCrop(){
  analyzeBtn.innerText = interfaceText[document.getElementById("language").value].analyzeBtn;
  setTimeout(()=>{
    let detectedDiseases=[];
    diagnoses.forEach(d=>{
      if(Math.random()>0.5) detectedDiseases.push(d);
    });
    if(detectedDiseases.length===0)
      detectedDiseases.push(diagnoses[Math.floor(Math.random()*diagnoses.length)]);
    sessionStorage.setItem('plantImage', preview.src);
    sessionStorage.setItem('diagnosis', JSON.stringify(detectedDiseases));
    uploadPage.style.display='none';
    resultPage.style.display='block';
    displayResults();
  }, 2000);
}

function displayResults(){
  const diseases = JSON.parse(sessionStorage.getItem('diagnosis'));
  const imgData = sessionStorage.getItem('plantImage');
  const lang = document.getElementById("language").value;

  document.getElementById('plantImage').src = imgData;
  document.getElementById('diseaseName').textContent = diseases.map(d=>d.name[lang]).join(", ");
  document.getElementById('confidence').textContent = Math.floor(Math.random()*10+90) + "%";
  document.getElementById('causesList').innerHTML = diseases.map(d=>"<li>"+d.cause[lang]+"</li>").join("");
  document.getElementById('preventionList').innerHTML = diseases.map(d=>"<li>"+d.treatment[lang]+"</li>").join("");

  const texts = interfaceText[lang];
  document.getElementById('headerTitle').innerHTML = texts.header;
  document.getElementById('uploadTitle').innerHTML = texts.uploadTitle;
  document.getElementById('chooseImg').innerHTML = texts.chooseImg;
  analyzeBtn.innerHTML = texts.analyzeBtn;
  document.getElementById('weather').innerHTML = texts.weather;
  document.getElementById('soil').innerHTML = texts.soil;
  document.getElementById('pest').innerHTML = texts.pest;
  document.getElementById('guideBtn').innerHTML = texts.guide;
  document.getElementById('expertBtn').innerHTML = texts.expert;
  document.getElementById('scanBtn').innerHTML = texts.scan;
  document.getElementById('shareBtn').innerHTML = texts.share;
}

function changeLanguage(){
  displayResults();
}

function contactExpert(){
  const diagnosis = document.getElementById("diseaseName").textContent;
  const phone = document.getElementById("district").value;
  const message = "Hello Sir, I analyzed my crop using AI Crop Health App. Disease detected: "+diagnosis+". Please guide me.";
  const url = "https://wa.me/"+phone+"?text="+encodeURIComponent(message);
  window.location.href = url;
}

function showGuide(){ alert("Complete crop treatment guide available."); }
function newScan(){ location.reload(); }
function shareResult(){
  const diagnosis = document.getElementById("diseaseName").textContent;
  navigator.clipboard.writeText("Crop Diagnosis: "+diagnosis);
  alert("Result copied!");
}
</script>

</body>
</html>
