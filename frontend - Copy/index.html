<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Disease Detection</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #preview {
            margin-top: 20px;
            max-width: 300px;
            display: none;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h2>AI Crop Disease Detection</h2>

<input type="file" id="imageInput" accept="image/*">
<br><br>
<button onclick="uploadImage()">Predict</button>
<br>
<img id="preview">
<div id="result"></div>

<script>
async function uploadImage() {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image first!");
        return;
    }

    // Show preview
    const preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    // Prepare form data
    const formData = new FormData();
    formData.append("file", file);

    try {
        // Call backend
        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            body: formData
        });

        // Parse JSON
        const data = await response.json();
        console.log("Backend Response:", data);

        const resultDiv = document.getElementById("result");

        // Display single prediction
        if (data.disease && data.confidence !== undefined) {
            resultDiv.innerText = 
                `Disease: ${data.disease} | Confidence: ${(data.confidence*100).toFixed(2)}%`;
        } else {
            resultDiv.innerText = "No prediction returned!";
        }

    } catch (error) {
        console.error("Error:", error);
        document.getElementById("result").innerText = "Error connecting to backend!";
    }
}
<!DOCTYPE html>
<html>
<head>
    <title>🌱 AI Crop Health Diagnosis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

            object-fit: cover;

            border: 4px solid #e8f5e8;

            background: linear-gradient(135deg, #dc3545, #c82333);

        .analyze-btn:disabled {
            opacity: 0.6;

        /* RESULTS PAGE */
        .result-page { display: none; }
        .result-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            border: 1px solid #e9ecef;
        }

        .result-title {
            font-size: 32px;
            text-align: center;
            color: #2e7d32;
            margin-bottom: 35px;
            font-weight: 700;
        }

        .top-section {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .image-box {
            position: relative;
            flex: 1;
            max-width: 480px;
        }

        #plantImage {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: 4px solid #e8f5e8;
        }

        .overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(46,125,50,0.95);
            color: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .info-side { flex: 1; }

        .card {
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .causes {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
            border-left: 5px solid #f44336;
        }

        .prevention {
            background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c8 100%);
            color: #2e7d32;
            border-left: 5px solid #4caf50;
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }

        .card ul {
            list-style: none;
            padding: 0;
        }

        .card li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .causes li::before {
            content: "⚠️";
            position: absolute;
            left: 0;
        }

        .prevention li::before {
            content: "✅";
            position: absolute;
            left: 0;
        }

        .bottom-cards {
            display: flex;
            gap: 20px;
            margin: 40px 0;
        }

        .alert {
            flex: 1;
            padding: 25px;
            border-radius: 16px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-weight: 500;
        }

        .weather { background: linear-gradient(135deg, #2196f3, #1976d2); }
        .soil { background: linear-gradient(135deg, #795548, #5d4037); }
        .pest { background: linear-gradient(135deg, #ff9800, #f57c00); }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 45px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .guide { background: linear-gradient(135deg, #2196f3, #1976d2); }
        .expert { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .tips { background: linear-gradient(135deg, #4caf50, #388e3c); }
        .share { background: linear-gradient(135deg, #9c27b0, #7b1fa2); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .top-section, .bottom-cards { flex-direction: column; }
            .upload-box, .result-container { margin: 10px; padding: 30px 25px; }
            .upload-page header { font-size: 24px; margin: -10px -10px 25px -10px; }
        }
    </style>
</head>
<body>
    <!-- UPLOAD PAGE -->
    <div class="upload-page" id="uploadPage">
        <header>🌱 AI Crop Health Diagnosis</header>
        <section class="upload-section">
            <div class="upload-box">
                <h2>Upload Plant Photo for Analysis</h2>
                
                <label for="imageInput" class="upload-btn">
                    📁 Choose Image
                </label>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                
                <img id="preview" alt="Preview">
                
                <button class="analyze-btn" id="analyzeBtn" onclick="analyzeCrop()" disabled>
                    🔬 Analyze Crop
                </button>
            </div>
        </section>
    </div>

    <!-- RESULTS PAGE -->
    <div class="result-page" id="resultPage">
        <div class="result-container">
            <h2 class="result-title">✅ Analysis Complete</h2>
            
            <div class="top-section">
                <div class="image-box">
                    <img id="plantImage" src="" alt="Plant analysis">
                    <div class="overlay" id="overlay">
                        <h3 id="diseaseName">Processing...</h3>
                        <p id="confidence">Analyzing...</p>
                    </div>
                </div>
                
                <div class="info-side">
                    <div class="card causes">
                        <h3>🦠 Disease Causes</h3>
                        <ul id="causesList">
                            <li>Analyzing image...</li>
                        </ul>
                    </div>
                    
                    <div class="card prevention">
                        <h3>💊 Treatment Plan</h3>
                        <ul id="preventionList">
                            <li>Generating recommendations...</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="bottom-cards">
                <div class="alert weather">
                    <h4>🌤️ Weather</h4>
                    <p>Humidity 78%<br>Monsoon Risk</p>
                </div>
                <div class="alert soil">
                    <h4>🌾 Soil</h4>
                    <p>Nitrogen Low<br>Fertilizer Needed</p>
                </div>
                <div class="alert pest">
                    <h4>🐛 Pests</h4>
                    <p>Aphids Present<br>Neem Oil Spray</p>
                </div>
            </div>

            <div class="buttons">
                <button class="btn guide" onclick="showGuide()">📖 Guide</button>
                <button class="btn expert" onclick="contactExpert()">👨‍🌾 Expert</button>
                <button class="btn tips" onclick="newScan()">🔄 New Scan</button>
                <button class="btn share" onclick="shareResult()">📤 Share</button>
            </div>
        </div>
    </div>

    <script>
        const uploadPage = document.getElementById('uploadPage');
        const resultPage = document.getElementById('resultPage');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');

        const diagnoses = [
            {
                name: "Early Blight",
                cause: "Fungal pathogen (Alternaria solani)",
                treatment: "Apply copper fungicide, prune lower leaves, improve air circulation"
            },
            {
                name: "Late Blight", 
                cause: "Phytophthora infestans fungus",
                treatment: "Remove and destroy infected plants, apply protective fungicide"
            },
            {
                name: "Healthy Plant",
                cause: "No disease symptoms detected",
                treatment: "Continue current practices, monitor regularly"
            },
            {
                name: "Bacterial Spot",
                cause: "Xanthomonas bacteria infection", 
                treatment: "Copper bactericide, avoid overhead watering, sanitize tools"
            }
        ];

        imageInput.addEventListener('change', function() {
            const file = imageInput.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    analyzeBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        function analyzeCrop() {
            analyzeBtn.textContent = 'Analyzing...';
            analyzeBtn.disabled = true;

            setTimeout(() => {
                const diagnosis = diagnoses[Math.floor(Math.random() * diagnoses.length)];
                sessionStorage.setItem('plantImage', preview.src);
                sessionStorage.setItem('diagnosis', JSON.stringify(diagnosis));
                
                uploadPage.style.opacity = '0';
                setTimeout(() => {
                    uploadPage.style.display = 'none';
                    resultPage.style.display = 'block';
                    resultPage.style.opacity = '0';
                    resultPage.style.transition = 'opacity 0.5s ease';
                    resultPage.style.opacity = '1';
                    displayResults();
                }, 500);
            }, 2000);
        }

        function displayResults() {
            const imgData = sessionStorage.getItem('plantImage');
            const diagnosisData = JSON.parse(sessionStorage.getItem('diagnosis') || '{}');
            
            if (imgData) {
                document.getElementById('plantImage').src = imgData;
                document.getElementById('diseaseName').textContent = diagnosisData.name || 'Healthy';
                document.getElementById('confidence').textContent = 
                    `${Math.floor(Math.random() * 12 + 88)}% Confidence`;
                
                document.getElementById('causesList').innerHTML = 
                    `<li>• ${diagnosisData.cause || 'No issues detected'}</li>`;
                
                const treatments = diagnosisData.treatment ? diagnosisData.treatment.split(',') : [];
                document.getElementById('preventionList').innerHTML = 
                    treatments.map(t => `<li>• ${t.trim()}</li>`).join('');
            }
        }

        function showGuide() {
            alert('📖 Complete treatment guide and crop calendar\nAvailable in premium version');
        }

        function contactExpert() {
            alert('👨‍🌾 Contact Local Expert\n📱 WhatsApp: +91-XXXXXXXXXX\n🌾 Agricultural Extension Officer');
        }

        function newScan() {
            sessionStorage.clear();
            resultPage.style.display = 'none';
            uploadPage.style.display = 'block';
            uploadPage.style.opacity = '1';
            preview.style.display = 'none';
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '🔬 Analyze Crop';
            imageInput.value = '';
        }

        function shareResult() {
            const diagnosis = document.getElementById('diseaseName').textContent;
            const text = `🌱 Crop Diagnosis: ${diagnosis}\nAnalyzed by AI Crop Health App`;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Results copied to clipboard!\n📱 Paste in WhatsApp or SMS');
            }).catch(() => {
                prompt('Copy this result:\n\n' + text);
            });
        }

        // Check if returning from results
        if (sessionStorage.getItem('plantImage')) {
            uploadPage.style.display = 'none';
            resultPage.style.display = 'block';
            displayResults();
        }
    </script>
</body>
</html>
